# ── PK-Erkennung ─────────────────────────────────────────────
# ausschluss_spalten: Spalten, die NICHT als PK-Kandidaten geprüft werden.
#   → Freitextfelder, Messwerte und Datumsfelder ausschließen,
#     da diese zufällig eindeutig sein können, aber semantisch
#     keine geeigneten Schlüssel darstellen.
# max_composite: Maximale Anzahl Spalten im zusammengesetzten Schlüssel.
#   → 1 = nur Einzelspalten prüfen
#   → 2 = Einzel- und Zweifach-Kombinationen prüfen
#   → 3 = bis zu Dreifach-Kombinationen prüfen (langsamer bei breiten Tabellen)

pk_discovery:
  artikeldaten_grunddaten:
    max_composite: 2
    ausschluss_spalten:
      - Artikelname         # Freitext, nicht stabil als Schlüssel
      - Bruttogewicht       # Messwert
      - Nettogewicht in kg  # Messwert
      - Laenge_cm           # Messwert
      - Breite_cm           # Messwert
      - Hoehe_cm            # Messwert
      - Verpackungsart      # Kategoriewert, nicht eindeutig
      - Hersteller          # Kategoriewert, nicht eindeutig
      - Status              # Statuswert, nicht eindeutig

  werksdaten:
    max_composite: 3
    ausschluss_spalten:
      - Lagerort            # Lagerortcode existiert in allen Werken → kein Diskriminator
      - Mindestbestand      # Messwert
      - Disponent           # Kategoriewert
      - Laenge_cm_werk      # Messwert
      - Breite_cm_werk      # Messwert
      - Hoehe_cm_werk       # Messwert
      - Mass_Einheit        # Kategoriewert
      - Status              # Statuswert

  preise:
    max_composite: 3
    ausschluss_spalten:
      - UVP                 # Messwert, zufällig eindeutig nicht aussagekräftig
      - Gültig_bis          # Abgeleitet aus Gültig_ab + Laufzeit

  kategorisierung:
    max_composite: 3
    ausschluss_spalten: []  # Alle Spalten prüfen — Tabelle hat kein offensichtliches Schlüsselfeld

  lieferantendaten:
    max_composite: 2
    ausschluss_spalten:
      - Lieferantenname     # Freitext, nicht stabil (Duplikate vorhanden)
      - Adresse             # Freitext, nicht atomar (1NF-Verletzung)
      - Kontaktperson       # Freitext
      - Telefon             # Freitext
      - Biozertifiziert     # Boolescher Wert, nicht eindeutig
      - Land                # Kategoriewert
      - Status              # Statuswert
